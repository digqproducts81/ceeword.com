<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted | CEEWORD AI STUDIO</title>
    <link rel="icon" href="https://ceewordcom.vercel.app/fevi.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="https://ceewordcom.vercel.app/fevi.jpg">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent: #000000;
            --border: #e5e7eb;
            --radius-lg: 1rem;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }
        .success-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: #f0fdf4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .icon-wrapper svg { color: #10b981; width: 32px; height: 32px; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 600; }
        p { color: var(--text-secondary); line-height: 1.6; margin-bottom: 1.5rem; }
        .code-box {
            background: #f9fafb;
            border: 1px dashed var(--border);
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.875rem 1.5rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn:hover { background: #1f2937; transform: translateY(-1px); }
        .footer-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .footer-link:hover { color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Application Submitted Successfully</h1>
        <p>Thank you for applying. Please save this code carefully. You will need it to check your application status.</p>
        
        <div class="code-box" id="appCodeDisplay">CW-XXXXXX</div>
        
        <p style="font-size: 0.9375rem;">We typically review applications within seven business days.</p>
        
        <a href="getstarted.html" class="btn">Check Status or Login</a>
        <a href="index.html" class="footer-link">← Back to Home</a>
    </div>

    <script>
        // Extract code from URL and display it
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if (code) {
            document.getElementById('appCodeDisplay').textContent = code;
        }
    </script>
</body>
</html>
